<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden – CPG Corporate Publishing Group</title>
<meta name="description" content="Die angeforderte Seite existiert nicht. Kehren Sie zur Startseite zurück oder nutzen Sie die Navigation.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://cpg.at/">
<link rel="dns-prefetch" href="//fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;900&family=DM+Sans:wght@400;600&display=swap" as="style">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
:root{--ink:#1a1a1a;--dark:#2a2a2a;--paper:#f4f2ef;--cream:#e8e4de;--blue:#5b9bb3;--blue-dark:#3d7a94}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:26px 48px;display:flex;justify-content:space-between;align-items:center;background:rgba(42,42,42,.95);backdrop-filter:blur(12px)}
.nav-logo{height:40px;width:auto;max-width:140px}
.nav-logo img{height:40px;width:auto;max-width:140px;object-fit:contain}
.container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:120px 48px}
.content{text-align:center;max-width:700px}
.error-code{font-family:'Playfair Display',serif;font-size:clamp(64px,15vw,120px);font-weight:900;color:var(--blue);margin-bottom:24px}
h1{font-family:'Playfair Display',serif;font-size:clamp(32px,8vw,54px);font-weight:400;line-height:1.2;color:var(--dark);margin-bottom:24px}
p{font-size:16px;line-height:1.8;color:#666;margin-bottom:48px;max-width:500px;margin-left:auto;margin-right:auto}
.cta-group{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
a{display:inline-flex;align-items:center;gap:12px;padding:14px 36px;background:var(--blue);color:#fff;text-decoration:none;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;border-radius:2px;transition:all .3s}
a:hover{background:var(--blue-dark);transform:translateY(-2px)}
.secondary{background:transparent;color:var(--blue);border:1px solid var(--blue)}
.secondary:hover{background:rgba(91,155,179,.04)}
@media(max-width:768px){
.nav{padding:18px 24px}
.container{padding:80px 24px;padding-top:120px}
.error-code{font-size:72px;margin-bottom:16px}
h1{font-size:28px}
p{font-size:14px}
.cta-group{flex-direction:column;gap:12px}
a{width:100%}
}
</style>
</head>
<body>
<nav class="nav">
<a href="/" class="nav-logo">
<img src="/img/logo-white.webp" alt="CPG Logo">
</a>
</nav>

<div class="container">
<div class="content">
<div class="error-code">404</div>
<h1>Seite nicht gefunden</h1>
<p>Die Seite, die Sie suchen, existiert leider nicht oder wurde verschoben. Bitte nutzen Sie die Navigation oder kehren Sie zur Startseite zurück.</p>
<div class="cta-group">
<a href="/">← Zur Startseite</a>
<a href="/#medien" class="secondary">Zu unseren Medien →</a>
</div>
</div>
</div>
</body>
</html>
